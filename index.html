<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ノート見本作成ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --font-kyokasho: "UD Digi Kyokasho N-R", "UD Digi Kyokasho N-B", "Klee One", "BIZ UDPMincho", "Yu Mincho", serif;
        }

        body {
            font-family: sans-serif;
            background-color: #f3f4f6;
        }

        .a4-paper {
            width: 210mm;
            height: 297mm;
            min-height: 297mm;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            margin: 0 auto 2rem auto;
            position: relative;
            padding: 20mm;
            box-sizing: border-box;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .notebook-header {
            width: 100%;
            height: 25mm;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10mm;
            font-family: var(--font-kyokasho);
            border-bottom: 2px solid #374151; /* 濃いグレーの線 */
            padding-bottom: 5mm;
            box-sizing: border-box;
        }

        .header-item {
            display: flex;
            align-items: center;
        }

        .header-label {
            font-size: 14px;
            color: #4b5563;
            margin-right: 5mm;
            white-space: nowrap;
        }

        .header-line {
            border-bottom: 1px dashed #9ca3af;
            height: 20px;
        }

        .header-date { width: 40mm; }
        .header-title { width: 60mm; flex-grow: 1; margin: 0 10mm; }
        .header-name { width: 50mm; }

        .notebook-grid {
            display: grid;
            font-family: var(--font-kyokasho);
            flex-grow: 1;
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            line-height: 1;
        }

        .style-grid .cell {
            border: 1px solid #16a34a;
        }

        .style-grid-gray .cell {
            border: 1px solid #9ca3af;
        }

        .style-leader .cell {
            border: 1px solid #16a34a;
        }
        .style-leader .cell::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            border-top: 1px dashed #86efac;
            z-index: 0;
        }
        .style-leader .cell::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            border-left: 1px dashed #86efac;
            z-index: 0;
        }

        .style-leader-gray .cell {
            border: 1px solid #9ca3af;
        }
        .style-leader-gray .cell::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            border-top: 1px dashed #d1d5db;
            z-index: 0;
        }
        .style-leader-gray .cell::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            border-left: 1px dashed #d1d5db;
            z-index: 0;
        }

        .cell-content {
            z-index: 10;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body {
                background-color: white;
            }
            .no-print {
                display: none !important;
            }
            .print-area {
                width: 100%;
                height: 100%;
                padding: 0;
                overflow: visible;
                display: block;
            }
            .a4-paper {
                box-shadow: none;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                page-break-after: always;
                break-after: page;
            }
            .a4-paper:last-child {
                page-break-after: auto;
                break-after: auto;
            }
        }

        /* 句読点を右上に配置 */
        .cell-content.punctuation {
            position: absolute;
            top: 0;
            right: 0;
            left: auto;
            bottom: auto;
            width: 50%;
            height: 50%;
            font-size: 0.8em;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            line-height: 1;
            transform: translate(30%, -25%);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="w-80 bg-white border-r border-gray-200 p-6 flex flex-col h-full overflow-y-auto no-print z-10 shadow-lg">
        <h1 class="text-xl font-bold mb-6 text-gray-800">ノート見本作成ツール</h1>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">見本テキスト</label>
            <textarea id="inputText" rows="5" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="ここに文字を入力します。&#10;改行も反映されます。">あいうえお
かきくけこ

さしすせそ</textarea>
            <p class="text-xs text-gray-500 mt-1">※改行すると次の行に移動します。</p>
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">ヘッダーの表示</label>
            <label class="inline-flex items-center">
                <input type="checkbox" id="showHeader" class="form-checkbox text-blue-600">
                <span class="ml-2 text-sm">日付・タイトル・名前欄を追加</span>
            </label>
        </div>

        <div class="mb-5 border-t border-gray-200 pt-4">
            <h2 class="text-sm font-bold text-gray-700 mb-2">テンプレート（プリセット）</h2>
            <select id="templateSelect" class="w-full border border-gray-300 rounded-md p-2 text-sm mb-4">
                <option value="custom">カスタム設定</option>
                <option value="kokugo-15">国語 15マス（縦書き）</option>
                <option value="kokugo-12">国語 12マス（縦書き）</option>
                <option value="math-17">算数 17マス（横書き）</option>
                <option value="math-22">算数 22マス（横書き）</option>
                <option value="genko-400">原稿用紙 400字（縦書き）</option>
            </select>

            <label class="block text-sm font-medium text-gray-700 mb-1">文字の向き</label>
            <div class="flex flex-col space-y-2">
                <label class="inline-flex items-center">
                    <input type="radio" name="direction" value="vertical" class="form-radio text-blue-600" checked>
                    <span class="ml-2 text-sm">縦書き（右上からスタート）</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="radio" name="direction" value="horizontal" class="form-radio text-blue-600">
                    <span class="ml-2 text-sm">横書き（左上からスタート）</span>
                </label>
            </div>
        </div>

        <div class="mb-5 border-t border-gray-200 pt-4">
            <h2 class="text-sm font-bold text-gray-700 mb-2">ノートの規格</h2>
            <div class="flex space-x-4">
                <div class="flex-1">
                    <label class="block text-xs text-gray-600 mb-1">1行のマス数</label>
                    <input type="number" id="colsCount" value="10" min="5" max="30" class="w-full border border-gray-300 rounded-md p-2 text-sm">
                </div>
                <div class="flex-1">
                    <label class="block text-xs text-gray-600 mb-1">行数</label>
                    <input type="number" id="rowsCount" value="7" min="3" max="25" class="w-full border border-gray-300 rounded-md p-2 text-sm">
                </div>
            </div>
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">マス目の種類</label>
            <select id="gridStyle" class="w-full border border-gray-300 rounded-md p-2 text-sm">
                <option value="style-leader">十字リーダーあり（緑）</option>
                <option value="style-grid">マス目のみ（緑）</option>
                <option value="style-leader-gray">十字リーダーあり（グレー）</option>
                <option value="style-grid-gray">マス目のみ（グレー）</option>
                <option value="style-none">枠線なし（白紙）</option>
            </select>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">
                文字の大きさ: <span id="fontSizeDisplay">80</span>%
            </label>
            <input type="range" id="fontSizeRatio" min="30" max="100" value="80" class="w-full">
            <p class="text-xs text-gray-500 mt-1">※マスに対する大きさの割合です。</p>
        </div>

        <div class="mt-auto pt-4 border-t border-gray-200 flex flex-col space-y-2">
            <button onclick="window.print()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded flex items-center justify-center transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                A4サイズで印刷
            </button>
            <button onclick="downloadPNG()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded flex items-center justify-center transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                画像 (PNG) を保存
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-auto bg-gray-500 print-area flex justify-center py-8">
        <div id="scaleWrapper" style="transform-origin: top center; display: flex; flex-direction: column; align-items: center;">
        </div>
    </div>

    <script>
        const elements = {
            input: document.getElementById('inputText'),
            direction: document.getElementsByName('direction'),
            cols: document.getElementById('colsCount'),
            rows: document.getElementById('rowsCount'),
            style: document.getElementById('gridStyle'),
            fontSizeRatio: document.getElementById('fontSizeRatio'),
            fontSizeDisplay: document.getElementById('fontSizeDisplay'),
            showHeader: document.getElementById('showHeader'),
            templateSelect: document.getElementById('templateSelect'),
            scaleWrapper: document.getElementById('scaleWrapper')
        };

        const TEMPLATES = {
            'kokugo-15': { cols: 15, rows: 10, dir: 'vertical', style: 'style-leader' },
            'kokugo-12': { cols: 12, rows: 8, dir: 'vertical', style: 'style-leader' },
            'math-17': { cols: 17, rows: 12, dir: 'horizontal', style: 'style-grid' },
            'math-22': { cols: 22, rows: 15, dir: 'horizontal', style: 'style-grid' },
            'genko-400': { cols: 20, rows: 20, dir: 'vertical', style: 'style-grid' }
        };

        const STORAGE_KEY = 'notebookToolState';

        function loadState() {
            const savedState = localStorage.getItem(STORAGE_KEY);
            if (savedState) {
                try {
                    const state = JSON.parse(savedState);
                    if (state.text !== undefined) elements.input.value = state.text;
                    if (state.direction) {
                        elements.direction.forEach(radio => {
                            radio.checked = (radio.value === state.direction);
                        });
                    }
                    if (state.cols !== undefined) elements.cols.value = state.cols;
                    if (state.rows !== undefined) elements.rows.value = state.rows;
                    if (state.style) elements.style.value = state.style;
                    if (state.showHeader !== undefined) elements.showHeader.checked = state.showHeader;
                    if (state.templateSelect) elements.templateSelect.value = state.templateSelect;
                    if (state.fontSizeRatio !== undefined) {
                        elements.fontSizeRatio.value = state.fontSizeRatio;
                        elements.fontSizeDisplay.textContent = state.fontSizeRatio;
                    }
                } catch (e) {
                    console.error("ストレージ読み込みエラー:", e);
                }
            }
        }

        function saveState() {
            const currentDir = Array.from(elements.direction).find(r => r.checked).value;
            const state = {
                text: elements.input.value,
                direction: currentDir,
                cols: elements.cols.value,
                rows: elements.rows.value,
                style: elements.style.value,
                showHeader: elements.showHeader.checked,
                templateSelect: elements.templateSelect.value,
                fontSizeRatio: elements.fontSizeRatio.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        // 初期化時に保存された状態を読み込む
        loadState();

        function renderNotebook() {
            const text = elements.input.value;
            const direction = Array.from(elements.direction).find(radio => radio.checked).value;
            const colsCount = parseInt(elements.cols.value) || 10;
            const rowsCount = parseInt(elements.rows.value) || 7;
            const style = elements.style.value;
            const fontRatio = parseInt(elements.fontSizeRatio.value) / 100;

            elements.scaleWrapper.innerHTML = '';

            const cellsPerLine = colsCount;
            const maxLines = rowsCount;
            const includeHeader = elements.showHeader.checked;

            // A4用紙の利用可能サイズ（mm単位で直接計算、ピクセル変換なし）
            // A4: 210mm x 297mm, padding各辺20mm → 利用可能: 170mm x 257mm
            const AVAIL_W_MM = 170;
            // ヘッダーがある場合は高さを調整 (35mm: 25mm header + 10mm margin)
            const AVAIL_H_MM = includeHeader ? (257 - 35) : 257;

            // グリッドの列数・行数を計算（A4縦向きに収まるように）
            // 横書き: gridCols=cellsPerLine（横方向）, gridRows=maxLines（縦方向）
            // 縦書き: gridCols=maxLines（横方向＝行数）, gridRows=cellsPerLine（縦方向＝1行のマス数）
            let gridCols, gridRows;
            if (direction === 'horizontal') {
                gridCols = cellsPerLine;
                gridRows = maxLines;
            } else {
                gridCols = maxLines;
                gridRows = cellsPerLine;
            }

            // 正方形のセルサイズを計算（mm単位、A4に収まる最大サイズ）
            // 小数点以下1桁に丸めてわずかなバッファを確保
            const cellSizeMM = Math.floor(Math.min(AVAIL_W_MM / gridCols, AVAIL_H_MM / gridRows) * 10) / 10;
            const cellSizePx = cellSizeMM * 3.7795; // フォントサイズ計算用
            const fontSize = cellSizePx * fontRatio;

            // テキストのパースとマス割り当てロジック
            const lines = text.split('\n');
            const gridData = [];
            const kinsokuChars = ['、', '。', '，', '．', ',', '.', '！', '？', '!', '?'];

            for (const line of lines) {
                let currentLineChars = [];
                const chars = Array.from(line);

                for (let c = 0; c < chars.length; c++) {
                    const char = chars[c];

                    // 禁則処理
                    if (currentLineChars.length === 0 && gridData.length > 0 && kinsokuChars.includes(char)) {
                        const previousLine = gridData[gridData.length - 1];
                        previousLine[previousLine.length - 1] += char;
                        continue;
                    }

                    currentLineChars.push(char);
                    if (currentLineChars.length === cellsPerLine) {
                        gridData.push(currentLineChars);
                        currentLineChars = [];
                    }
                }

                if (currentLineChars.length > 0 || chars.length === 0) {
                    while (currentLineChars.length < cellsPerLine) {
                        currentLineChars.push('');
                    }
                    gridData.push(currentLineChars);
                }
            }

            if (gridData.length === 0) {
                gridData.push(Array(cellsPerLine).fill(''));
            }
            const totalPages = Math.ceil(gridData.length / maxLines) || 1;

            // 各ページを生成
            for (let p = 0; p < totalPages; p++) {
                const pageData = gridData.slice(p * maxLines, (p + 1) * maxLines);
                while (pageData.length < maxLines) {
                    pageData.push(Array(cellsPerLine).fill(''));
                }

                const paperDiv = document.createElement('div');
                paperDiv.className = 'a4-paper';
                
                // ヘッダーの追加
                if (includeHeader) {
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'notebook-header';
                    headerDiv.innerHTML = `
                        <div class="header-item">
                            <span class="header-label">月</span>
                            <div class="header-line header-date"></div>
                            <span class="header-label ml-2">日</span>
                            <div class="header-line header-date"></div>
                        </div>
                        <div class="header-item header-title">
                            <div class="header-line" style="width: 100%;"></div>
                        </div>
                        <div class="header-item">
                            <span class="header-label">なまえ</span>
                            <div class="header-line header-name"></div>
                        </div>
                    `;
                    paperDiv.appendChild(headerDiv);
                }

                const gridDiv = document.createElement('div');
                gridDiv.className = `notebook-grid ${style}`;
                gridDiv.style.gridTemplateColumns = `repeat(${gridCols}, ${cellSizeMM}mm)`;
                gridDiv.style.gridTemplateRows = `repeat(${gridRows}, ${cellSizeMM}mm)`;
                gridDiv.style.fontSize = `${fontSize}px`;

                if (direction === 'horizontal') {
                    // 横書き: 行(上→下)ごとに、セル(左→右)を並べる
                    for (let row = 0; row < maxLines; row++) {
                        const lineData = pageData[row];
                        for (let col = 0; col < cellsPerLine; col++) {
                            const cellDiv = createCell(lineData[col]);
                            gridDiv.appendChild(cellDiv);
                        }
                    }
                } else {
                    // 縦書き: gridCols=maxLines列 × gridRows=cellsPerLine行
                    // 文字の流れ: 右上→下→次の列（左方向）
                    // lineIndex(=行、右→左の列) → grid-column = maxLines - lineIndex
                    // charIndex(=マス、上→下)   → grid-row = charIndex + 1
                    for (let lineIndex = 0; lineIndex < maxLines; lineIndex++) {
                        const lineData = pageData[lineIndex];
                        for (let charIndex = 0; charIndex < cellsPerLine; charIndex++) {
                            const cellDiv = createCell(lineData[charIndex]);
                            cellDiv.style.gridColumn = maxLines - lineIndex;
                            cellDiv.style.gridRow = charIndex + 1;
                            gridDiv.appendChild(cellDiv);
                        }
                    }
                }

                paperDiv.appendChild(gridDiv);
                elements.scaleWrapper.appendChild(paperDiv);
            }

            // 描画が更新されるたびに状態を保存する
            saveState();
        }

        const PUNCTUATION_CHARS = ['、', '。', '，', '．', ',', '.', '！', '？', '!', '?'];

        function createCell(char) {
            const cellDiv = document.createElement('div');
            cellDiv.className = 'cell';
            if (char && char !== '') {
                const span = document.createElement('span');
                span.className = 'cell-content';
                // 1文字だけの句読点は右上に配置
                if (char.length === 1 && PUNCTUATION_CHARS.includes(char)) {
                    span.classList.add('punctuation');
                }
                span.textContent = char;
                cellDiv.appendChild(span);
            }
            return cellDiv;
        }

        function adjustScale() {
            if (window.matchMedia('print').matches) {
                elements.scaleWrapper.style.transform = 'scale(1)';
                return;
            }
            const wrapperWidth = elements.scaleWrapper.parentElement.clientWidth;
            const paperWidth = 210 * 3.78;
            if (wrapperWidth < paperWidth + 40) {
                const scale = (wrapperWidth - 40) / paperWidth;
                elements.scaleWrapper.style.transform = `scale(${scale})`;
            } else {
                elements.scaleWrapper.style.transform = 'scale(1)';
            }
        }

        async function downloadPNG() {
            const papers = document.querySelectorAll('.a4-paper');
            if (papers.length === 0) return;

            // Transformを一時的に解除して等倍でキャプチャする
            const originalTransform = elements.scaleWrapper.style.transform;
            elements.scaleWrapper.style.transform = 'scale(1)';

            try {
                // 最初のページをキャプチャ（複数ページの場合は最初の1枚のみ）
                const canvas = await html2canvas(papers[0], {
                    scale: 2, // 高解像度でキャプチャ
                    useCORS: true,
                    backgroundColor: '#ffffff'
                });

                // aタグを使ってダウンロード
                const link = document.createElement('a');
                link.download = 'notebook-sample.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error('画像保存エラー:', err);
                alert('画像の保存に失敗しました。');
            } finally {
                // Transformを元に戻す
                elements.scaleWrapper.style.transform = originalTransform;
                adjustScale();
            }
        }

        // イベントリスナー
        elements.input.addEventListener('input', renderNotebook);
        elements.showHeader.addEventListener('change', renderNotebook);
        elements.cols.addEventListener('input', () => { elements.templateSelect.value = 'custom'; renderNotebook(); });
        elements.rows.addEventListener('input', () => { elements.templateSelect.value = 'custom'; renderNotebook(); });
        elements.style.addEventListener('change', () => { elements.templateSelect.value = 'custom'; renderNotebook(); });
        let currentDirection = Array.from(elements.direction).find(r => r.checked).value;
        elements.direction.forEach(radio => radio.addEventListener('change', (e) => {
            if (e.target.checked && e.target.value !== currentDirection) {
                // 文字の向きを変えた時はカスタム扱いにする
                elements.templateSelect.value = 'custom';
                const temp = elements.cols.value;
                elements.cols.value = elements.rows.value;
                elements.rows.value = temp;
                currentDirection = e.target.value;
            }
            renderNotebook();
        }));

        elements.templateSelect.addEventListener('change', (e) => {
            const templateId = e.target.value;
            if (templateId !== 'custom' && TEMPLATES[templateId]) {
                const tpl = TEMPLATES[templateId];
                elements.cols.value = tpl.cols;
                elements.rows.value = tpl.rows;
                elements.style.value = tpl.style;
                elements.direction.forEach(radio => {
                    radio.checked = (radio.value === tpl.dir);
                });
                currentDirection = tpl.dir;
            }
            renderNotebook();
        });

        elements.fontSizeRatio.addEventListener('input', (e) => {
            elements.fontSizeDisplay.textContent = e.target.value;
            renderNotebook();
        });

        window.addEventListener('resize', () => {
            adjustScale();
            renderNotebook();
        });

        adjustScale();
        renderNotebook();
    </script>
</body>
</html>
