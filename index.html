        const PUNCTUATION_CHARS = ['、', '。', '，', '．', ',', '.', '！', '？', '!', '?'];

        // 縦書き時に括弧類を縦書き用Unicode文字に変換するマップ
        const VERTICAL_BRACKET_MAP = {
            '「': '﹁',
            '」': '﹂',
            '『': '﹃',
            '』': '﹄',
            '（': '︵',
            '）': '︶',
            '〔': '︗',
            '〕': '︘',
            '【': '︻',
            '】': '︼',
            '〈': '︿',
            '〉': '﹀',
            '《': '︽',
            '》': '︾',
            '｛': '︷',
            '｝': '︸',
            'ー': 'ー',
            '〜': '〜',
        };

        // 色タグの定義
        const COLOR_MAP = {
            '赤': '#ef4444',
            '青': '#3b82f6',
            '黄': '#eab308',
            '緑': '#22c55e',
            '橙': '#f97316',
        };

        // テキストを色タグ付きで1文字ずつに分解する
        // 例: "あ[赤:い]う" → [{char:'あ'}, {char:'い', color:'#ef4444'}, {char:'う'}]
        function parseColoredText(text, startIndex = 0) {
            const result = [];
            const re = /\[([^:]+):([^\]]+)\]/g;
            let last = 0, m;
            while ((m = re.exec(text)) !== null) {
                // タグ前の通常文字
                for (let i = last; i < m.index; i++) {
                    result.push({ char: text[i], sourceIndex: startIndex + i });
                }
                const colorName = m[1];
                const colorContent = m[2];
                const color = COLOR_MAP[colorName];
                let contentStart = m.index + 1 + colorName.length + 1;
                for (let j = 0; j < colorContent.length; j++) {
                    result.push({ char: colorContent[j], color: color || null, sourceIndex: startIndex + contentStart + j });
                }
                last = re.lastIndex;
            }
            for (let i = last; i < text.length; i++) {
                result.push({ char: text[i], sourceIndex: startIndex + i });
            }
            return result;
        }

        // テキストエリアの選択範囲を色タグで囲む
        function wrapSelectedText(colorName) {
            const ta = elements.input;
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            if (start === end) return;
            const selected = ta.value.slice(start, end);
            const wrapped = `[${colorName}:${selected}]`;
            ta.value = ta.value.slice(0, start) + wrapped + ta.value.slice(end);
            ta.selectionStart = start;
            ta.selectionEnd = start + wrapped.length;
            renderNotebookWithOverlay();
        }

        // 色タグをすべて除去する
        function removeColorTags() {
            elements.input.value = elements.input.value.replace(/\[([^:]+):([^\]]+)\]/g, '$2');
            renderNotebookWithOverlay();
        }

        function createCell(char, color, isVertical = false, sourceIndex = -1) {
            const cellDiv = document.createElement('div');
            cellDiv.className = 'cell';
            if (sourceIndex >= 0) {
                cellDiv.dataset.sourceIndex = sourceIndex;
            }
            if (char && char !== '') {
                const span = document.createElement('span');
                span.className = 'cell-content';
                if (char.length === 1 && PUNCTUATION_CHARS.includes(char)) {
                    if (isVertical) {
                        // 縦書き：句読点を右上に配置
                        span.classList.add('punctuation');
                    } else {
                        // 横書き：句読点を左下に配置
                        span.classList.add('punctuation-horizontal');
                    }
                }
                span.textContent = char;
                // 縦書きモード時：括弧類を90度回転させて正しい縦書き向きで表示
                if (isVertical && char.length === 1 && VERTICAL_BRACKET_MAP[char]) {
                    span.style.display = 'inline-block';
                    span.style.transform = 'rotate(90deg)';
                }
                if (color) span.style.color = color;
                cellDiv.appendChild(span);
            }
            return cellDiv;
        }

        function adjustScale() {
            if (window.matchMedia('print').matches) {
                elements.scaleWrapper.style.transform = 'scale(1)';
                elements.scaleWrapper.style.marginBottom = '0px';
                return;
            }
            
            // 実際のDOM高さを測るために一時的にスケールとマージンを解除
            elements.scaleWrapper.style.transform = 'scale(1)';
            elements.scaleWrapper.style.marginBottom = '0px';
            
            const wrapperWidth = elements.scaleWrapper.parentElement.clientWidth;
            // 横向き(297mm)か縦向き(210mm)か
            const tplId = elements.templateSelect.value;
            const isLandscape = TEMPLATES[tplId]?.isGenko || TEMPLATES[tplId]?.isNumberPractice;
            const paperWidth = (isLandscape ? 297 : 210) * 3.78;
            
            const padding = window.innerWidth < 768 ? 20 : 40;
            if (wrapperWidth < paperWidth + padding) {
                const scale = (wrapperWidth - padding) / paperWidth;
                
                // 本来の（スケール前の）高さを取得
                const unscaledHeight = elements.scaleWrapper.offsetHeight;
                
                elements.scaleWrapper.style.transform = `scale(${scale})`;
                
                // スケール後の余白を削減（ネガティブマージンで下部を詰める）
                const marginDiff = unscaledHeight * (1 - scale);
                elements.scaleWrapper.style.marginBottom = `-${marginDiff}px`;
            } else {
                elements.scaleWrapper.style.transform = 'scale(1)';
                elements.scaleWrapper.style.marginBottom = '0px';
            }
        }

        async function downloadPNG() {
            const papers = document.querySelectorAll('.a4-paper');
            if (papers.length === 0) return;

            // Transformを一時的に解除して等倍でキャプチャする
            const originalTransform = elements.scaleWrapper.style.transform;
            const originalMargin = elements.scaleWrapper.style.marginBottom;
            elements.scaleWrapper.style.transform = 'scale(1)';
            elements.scaleWrapper.style.marginBottom = '0px';

            try {
                // 最初のページをキャプチャ（複数ページの場合は最初の1枚のみ）
                const canvas = await html2canvas(papers[0], {
                    scale: 2, // 高解像度でキャプチャ
                    useCORS: true,
                    backgroundColor: '#ffffff'
                });

                // aタグを使ってダウンロード
                const link = document.createElement('a');
                link.download = 'notebook-sample.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error('画像保存エラー:', err);
                alert('画像の保存に失敗しました。');
            } finally {
                // Transformを元に戻す
                elements.scaleWrapper.style.transform = originalTransform;
                elements.scaleWrapper.style.marginBottom = originalMargin;
                adjustScale();
            }
        }

        // ===== 手書きモード =====
        const drawing = {
            active: false,
            tool: 'free',
            color: '#1e3a8a',
            width: 3,
            textSize: 32,
            isDrawing: false,
            startX: 0,
            startY: 0,
            currentPath: null,
            previewLine: null,
            // 選択/移動
            selectedEl: null,
            selectionRect: null,
            dragOffsetX: 0,
            dragOffsetY: 0,
        };

        // Undoスタック: SVGごとに削除/追加した要素の履歴を管理
        const undoStack = [];

        function pushUndo(action) {
            undoStack.push(action);
            // スタックが多くなりすぎないよう上限を設定
            if (undoStack.length > 50) undoStack.shift();
        }

        function undoDrawing() {
            if (undoStack.length === 0) return;
            const action = undoStack.pop();
            if (action.type === 'add') {
                // 追加した要素を削除
                action.el.remove();
            } else if (action.type === 'remove') {
                // 削除した要素を復元
                action.svg.appendChild(action.el);
            } else if (action.type === 'move') {
                // 移動を元に戻す
                action.el.setAttribute('transform', action.prevTransform || '');
                action.el.setAttribute('data-tx', action.prevTx);
                action.el.setAttribute('data-ty', action.prevTy);
            }
        }

        function setDrawTool(tool) {
            drawing.tool = tool;
            // 選択解除
            clearSelection();
            document.querySelectorAll('.draw-tool-btn').forEach(b => {
                b.classList.remove('border-purple-500', 'bg-purple-500', 'text-white');
                b.classList.add('border-gray-300', 'text-gray-600', 'bg-white');
            });
            const active = document.getElementById('tool' + tool.charAt(0).toUpperCase() + tool.slice(1));
            if (active) {
                active.classList.remove('border-gray-300', 'text-gray-600', 'bg-white');
                active.classList.add('border-purple-500', 'bg-purple-500', 'text-white');
            }
            // カーソル更新
            const cursor = (tool === 'select' || tool === 'text') ? 'default' : 'crosshair';
            document.querySelectorAll('.drawing-overlay').forEach(svg => {
                svg.style.cursor = cursor;
            });
            // テキストサイズ行の表示切替
            document.getElementById('textSizeRow').classList.toggle('hidden', tool !== 'text');
        }

        function setDrawColor(color) {
            drawing.color = color;
            document.querySelectorAll('#drawingTools .w-6').forEach(b => {
                b.style.borderColor = '';
                b.classList.remove('border-gray-800');
                b.classList.add('border-gray-300');
            });
            event.currentTarget.style.borderColor = '#1e3a8a';
        }

        document.getElementById('strokeWidth').addEventListener('input', e => {
            drawing.width = parseInt(e.target.value);
        });

        document.getElementById('drawingMode').addEventListener('change', e => {
            drawing.active = e.target.checked;
            document.getElementById('drawingTools').classList.toggle('hidden', !drawing.active);
            // SVGオーバーレイのpointer-eventsを切り替え
            document.querySelectorAll('.drawing-overlay').forEach(svg => {
                svg.style.pointerEvents = drawing.active ? 'all' : 'none';
                svg.style.cursor = drawing.active ? 'crosshair' : 'default';
            });
        });

        function getScaledPos(svg, e) {
            const rect = svg.getBoundingClientRect();
            const scaleX = svg.viewBox.baseVal.width / rect.width;
            const scaleY = svg.viewBox.baseVal.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY,
            };
        }

        function attachDrawingEvents(svg) {
            svg.style.pointerEvents = drawing.active ? 'all' : 'none';
            svg.style.cursor = drawing.active ? 'crosshair' : 'default';

            const onStart = (e) => {
                if (!drawing.active) return;
                e.preventDefault();
                drawing.isDrawing = true;
                const pos = getScaledPos(svg, e);
                drawing.startX = pos.x;
                drawing.startY = pos.y;

                if (drawing.tool === 'select') {
                    // クリックした要素をSVGの直接子まで遡って取得
                    const hit = document.elementFromPoint(
                        e.touches ? e.touches[0].clientX : e.clientX,
                        e.touches ? e.touches[0].clientY : e.clientY
                    );
                    let el = hit;
                    while (el && el.parentElement !== svg) el = el.parentElement;
                    const target = (el && el !== svg && !el.classList.contains('sel-highlight')) ? el : null;

                    // 前の選択を解除
                    clearSelection();

                    if (target && target !== svg) {
                        drawing.selectedEl = target;
                        showSelectionHighlight(svg, target);
                        document.getElementById('deleteSelected').classList.remove('hidden');

                        // ドラッグオフセット計算（transform translate考慮）
                        const tx = parseFloat(target.getAttribute('data-tx') || 0);
                        const ty = parseFloat(target.getAttribute('data-ty') || 0);
                        drawing.dragOffsetX = pos.x - tx;
                        drawing.dragOffsetY = pos.y - ty;
                    } else {
                        document.getElementById('deleteSelected').classList.add('hidden');
                    }
                    return;
                }

                if (drawing.tool === 'text') {
                    drawing.isDrawing = false;
                    showTextInput(svg, pos, e);
                    return;
                }

                if (drawing.tool === 'free') {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('stroke', drawing.color);
                    path.setAttribute('stroke-width', drawing.width);
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke-linecap', 'round');
                    path.setAttribute('stroke-linejoin', 'round');
                    path.setAttribute('d', `M ${pos.x} ${pos.y}`);
                    svg.appendChild(path);
                    drawing.currentPath = path;
                    // Undo用に記録（onEndで確定）
                    drawing._pendingUndo = { type: 'add', el: path };
                } else if (drawing.tool === 'eraser') {
                    // 消しゴム：白パスではなく通過点の要素を直接削除する方式
                    drawing.currentPath = { d: `M ${pos.x} ${pos.y}`, svg };
                    drawing._erasedEls = [];
                    // 開始点での当たり判定
                    _eraserHitTest(svg, pos.x, pos.y);
                } else if (drawing.tool === 'line') {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('stroke', drawing.color);
                    line.setAttribute('stroke-width', drawing.width);
                    line.setAttribute('stroke-linecap', 'round');
                    line.setAttribute('x1', pos.x); line.setAttribute('y1', pos.y);
                    line.setAttribute('x2', pos.x); line.setAttribute('y2', pos.y);
                    svg.appendChild(line);
                    drawing.previewLine = line;
                    drawing._pendingUndo = { type: 'add', el: line };
                } else if (drawing.tool === 'circle') {
                    const el = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    el.setAttribute('stroke', drawing.color);
                    el.setAttribute('stroke-width', drawing.width);
                    el.setAttribute('fill', 'none');
                    el.setAttribute('cx', pos.x); el.setAttribute('cy', pos.y);
                    el.setAttribute('rx', 0); el.setAttribute('ry', 0);
                    svg.appendChild(el);
                    drawing.previewLine = el;
                    drawing._pendingUndo = { type: 'add', el };
                } else if (drawing.tool === 'rect') {
                    const el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    el.setAttribute('stroke', drawing.color);
                    el.setAttribute('stroke-width', drawing.width);
                    el.setAttribute('fill', 'none');
                    el.setAttribute('x', pos.x); el.setAttribute('y', pos.y);
                    el.setAttribute('width', 0); el.setAttribute('height', 0);
                    svg.appendChild(el);
                    drawing.previewLine = el;
                    drawing._pendingUndo = { type: 'add', el };
                } else if (drawing.tool === 'triangle' || drawing.tool === 'star') {
                    const el = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    el.setAttribute('stroke', drawing.color);
                    el.setAttribute('stroke-width', drawing.width);
                    el.setAttribute('fill', 'none');
                    el.setAttribute('stroke-linejoin', 'round');
                    el.setAttribute('points', `${pos.x},${pos.y}`);
                    svg.appendChild(el);
                    drawing.previewLine = el;
                    drawing._pendingUndo = { type: 'add', el };
                }
            };

            const onMove = (e) => {
                if (!drawing.active || !drawing.isDrawing) return;
                e.preventDefault();
                const pos = getScaledPos(svg, e);

                // 選択ツール: 要素をドラッグ移動
                if (drawing.tool === 'select') {
                    if (!drawing.selectedEl) return;
                    const newTx = pos.x - drawing.dragOffsetX;
                    const newTy = pos.y - drawing.dragOffsetY;
                    drawing.selectedEl.setAttribute('transform', `translate(${newTx},${newTy})`);
                    drawing.selectedEl.setAttribute('data-tx', newTx);
                    drawing.selectedEl.setAttribute('data-ty', newTy);
                    updateSelectionHighlight(svg, drawing.selectedEl);
                    return;
                }

                if (drawing.tool === 'free' && drawing.currentPath) {
                    const d = drawing.currentPath.getAttribute('d');
                    drawing.currentPath.setAttribute('d', d + ` L ${pos.x} ${pos.y}`);
                } else if (drawing.tool === 'eraser') {
                    // 消しゴム：通過点の要素をヒットテストして削除
                    _eraserHitTest(svg, pos.x, pos.y);
                } else if (drawing.tool === 'line' && drawing.previewLine) {
                    drawing.previewLine.setAttribute('x2', pos.x);
                    drawing.previewLine.setAttribute('y2', pos.y);
                } else if (drawing.tool === 'circle' && drawing.previewLine) {
                    const dx = pos.x - drawing.startX, dy = pos.y - drawing.startY;
                    const r = Math.sqrt(dx*dx + dy*dy) / 2;
                    const cx = (drawing.startX + pos.x) / 2, cy = (drawing.startY + pos.y) / 2;
                    drawing.previewLine.setAttribute('cx', cx);
                    drawing.previewLine.setAttribute('cy', cy);
                    drawing.previewLine.setAttribute('rx', r);
                    drawing.previewLine.setAttribute('ry', r);
                } else if (drawing.tool === 'rect' && drawing.previewLine) {
                    const x = Math.min(drawing.startX, pos.x), y = Math.min(drawing.startY, pos.y);
                    const w = Math.abs(pos.x - drawing.startX), h = Math.abs(pos.y - drawing.startY);
                    drawing.previewLine.setAttribute('x', x);
                    drawing.previewLine.setAttribute('y', y);
                    drawing.previewLine.setAttribute('width', w);
                    drawing.previewLine.setAttribute('height', h);
                } else if (drawing.tool === 'triangle' && drawing.previewLine) {
                    const dx = pos.x - drawing.startX, dy = pos.y - drawing.startY;
                    const r = Math.sqrt(dx*dx + dy*dy);
                    const cx = drawing.startX, cy = drawing.startY;
                    const p1 = `${cx},${cy - r}`;
                    const p2 = `${cx - r * 0.866},${cy + r * 0.5}`;
                    const p3 = `${cx + r * 0.866},${cy + r * 0.5}`;
                    drawing.previewLine.setAttribute('points', `${p1} ${p2} ${p3}`);
                } else if (drawing.tool === 'star' && drawing.previewLine) {
                    const dx = pos.x - drawing.startX, dy = pos.y - drawing.startY;
                    const outerR = Math.sqrt(dx*dx + dy*dy);
                    const innerR = outerR * 0.4;
                    const cx = drawing.startX, cy = drawing.startY;
                    let pts = '';
                    for (let i = 0; i < 10; i++) {
                        const angle = (i * Math.PI / 5) - Math.PI / 2;
                        const r2 = i % 2 === 0 ? outerR : innerR;
                        pts += `${cx + r2 * Math.cos(angle)},${cy + r2 * Math.sin(angle)} `;
                    }
                    drawing.previewLine.setAttribute('points', pts.trim());
                }
            };

            const onEnd = (e) => {
                // 手書き/図形追加のUndoを確定登録
                if (drawing._pendingUndo) {
                    pushUndo(drawing._pendingUndo);
                    drawing._pendingUndo = null;
                }
                // 消しゴムで削除した要素群をまとめてUndo登録
                if (drawing.tool === 'eraser' && drawing._erasedEls && drawing._erasedEls.length > 0) {
                    drawing._erasedEls.forEach(el => {
                        pushUndo({ type: 'remove', el, svg });
                    });
                    drawing._erasedEls = null;
                }
                drawing.isDrawing = false;
                drawing.currentPath = null;
                drawing.previewLine = null;
            };

            svg.addEventListener('mousedown', onStart);
            svg.addEventListener('mousemove', onMove);
            svg.addEventListener('mouseup', onEnd);
            svg.addEventListener('mouseleave', onEnd);
            svg.addEventListener('touchstart', onStart, { passive: false });
            svg.addEventListener('touchmove', onMove, { passive: false });
            svg.addEventListener('touchend', onEnd);
        }

        // 消しゴムのヒットテスト: SVGビューポート座標で指定点付近の描画要素を削除
        function _eraserHitTest(svg, x, y) {
            const radius = drawing.width * 3;
            const toDelete = [];
            for (const child of Array.from(svg.children)) {
                if (child.classList.contains('sel-highlight')) continue;
                try {
                    const bb = child.getBBox();
                    const tx = parseFloat(child.getAttribute('data-tx') || 0);
                    const ty = parseFloat(child.getAttribute('data-ty') || 0);
                    const cx = bb.x + bb.width / 2 + tx;
                    const cy = bb.y + bb.height / 2 + ty;
                    // バウンディングボックスとの距離を簡易チェック
                    const nearX = x >= bb.x + tx - radius && x <= bb.x + bb.width + tx + radius;
                    const nearY = y >= bb.y + ty - radius && y <= bb.y + bb.height + ty + radius;
                    if (nearX && nearY) {
                        toDelete.push(child);
                    }
                } catch(e) {}
            }
            toDelete.forEach(el => {
                el.remove();
                if (!drawing._erasedEls) drawing._erasedEls = [];
                drawing._erasedEls.push(el);
            });
        }

        function getElementBBox(el) {
            try { return el.getBBox(); } catch(e) { return null; }
        }

        function showSelectionHighlight(svg, el) {
            removeSelectionHighlight(svg);
            const bb = getElementBBox(el);
            if (!bb) return;
            const tx = parseFloat(el.getAttribute('data-tx') || 0);
            const ty = parseFloat(el.getAttribute('data-ty') || 0);
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.classList.add('sel-highlight');
            rect.setAttribute('x', bb.x + tx - 6);
            rect.setAttribute('y', bb.y + ty - 6);
            rect.setAttribute('width', bb.width + 12);
            rect.setAttribute('height', bb.height + 12);
            rect.setAttribute('fill', 'none');
            rect.setAttribute('stroke', '#6366f1');
            rect.setAttribute('stroke-width', '2');
            rect.setAttribute('stroke-dasharray', '6,4');
            rect.setAttribute('pointer-events', 'none');
            svg.appendChild(rect);
            drawing.selectionRect = rect;
        }

        function updateSelectionHighlight(svg, el) {
            if (!drawing.selectionRect) return;
            const bb = getElementBBox(el);
            if (!bb) return;
            const tx = parseFloat(el.getAttribute('data-tx') || 0);
            const ty = parseFloat(el.getAttribute('data-ty') || 0);
            drawing.selectionRect.setAttribute('x', bb.x + tx - 6);
            drawing.selectionRect.setAttribute('y', bb.y + ty - 6);
            drawing.selectionRect.setAttribute('width', bb.width + 12);
            drawing.selectionRect.setAttribute('height', bb.height + 12);
        }

        function removeSelectionHighlight(svg) {
            if (drawing.selectionRect) {
                drawing.selectionRect.remove();
                drawing.selectionRect = null;
            }
        }

        function clearSelection() {
            document.querySelectorAll('.drawing-overlay').forEach(s => removeSelectionHighlight(s));
            drawing.selectedEl = null;
            document.getElementById('deleteSelected').classList.add('hidden');
        }

        function deleteSelectedElement() {
            if (!drawing.selectedEl) return;
            const el = drawing.selectedEl;
            const svg = el.closest('svg');
            clearSelection();
            el.remove();
            pushUndo({ type: 'remove', el, svg });
        }

        function showTextInput(svg, pos, e) {
            // 既存の入力欄を除去
            const existing = document.getElementById('drawing-text-input');
            if (existing) existing.remove();

            // SVG座標→画面座標に変換
            const rect = svg.getBoundingClientRect();
            const scaleX = rect.width  / svg.viewBox.baseVal.width;
            const scaleY = rect.height / svg.viewBox.baseVal.height;
            const screenX = rect.left + pos.x * scaleX;
            const screenY = rect.top  + pos.y * scaleY;

            const textarea = document.createElement('textarea');
            textarea.id = 'drawing-text-input';
            textarea.placeholder = 'テキストを入力（Ctrl+Enterで確定、Escで取消）';
            textarea.style.cssText = `
                position: fixed;
                left: ${screenX}px; top: ${screenY}px;
                min-width: 120px; min-height: 36px;
                padding: 4px 6px;
                font-size: ${drawing.textSize * scaleX}px;
                color: ${drawing.color};
                font-family: sans-serif;
                background: rgba(255,255,255,0.92);
                border: 2px dashed #6366f1;
                border-radius: 4px;
                outline: none; resize: both;
                z-index: 9999; line-height: 1.4;
            `;
            document.body.appendChild(textarea);
            textarea.focus();

            const commit = () => {
                const value = textarea.value;
                textarea.remove();
                if (!value.trim()) return;

                // SVG <g> にテキストを配置（移動対応のためグループ化）
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('data-tx', '0');
                g.setAttribute('data-ty', '0');

                const lines = value.split('\n');
                const lineH = drawing.textSize * 1.4;
                lines.forEach((line, i) => {
                    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    t.setAttribute('x', pos.x);
                    t.setAttribute('y', pos.y + i * lineH);
                    t.setAttribute('fill', drawing.color);
                    t.setAttribute('font-size', drawing.textSize);
                    t.setAttribute('font-family', 'sans-serif');
                    t.setAttribute('dominant-baseline', 'text-before-edge');
                    t.textContent = line || ' ';
                    g.appendChild(t);
                });

                svg.appendChild(g);
            };

            textarea.addEventListener('keydown', ev => {
                if (ev.key === 'Escape') { textarea.remove(); return; }
                if ((ev.ctrlKey || ev.metaKey) && ev.key === 'Enter') { ev.preventDefault(); commit(); }
            });
            textarea.addEventListener('blur', commit);
        }

        function addDrawingOverlay(paperDiv) {
            // A4サイズ（縦297mm×210mm, or横）をpx換算してviewBoxに設定
            const isLandscape = paperDiv.classList.contains('a4-landscape');
            const W = isLandscape ? 297 * 3.7795 : 210 * 3.7795;
            const H = isLandscape ? 210 * 3.7795 : 297 * 3.7795;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.classList.add('drawing-overlay');
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.style.cssText = `
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                pointer-events: none; z-index: 100; overflow: visible;
            `;
            paperDiv.style.position = 'relative';
            paperDiv.appendChild(svg);
            attachDrawingEvents(svg);
        }

        function clearAllDrawings() {
            document.querySelectorAll('.drawing-overlay').forEach(svg => {
                // viewBox属性など以外のchild要素（描画内容）を削除
                while (svg.firstChild) svg.removeChild(svg.firstChild);
            });
        }

        // renderNotebook後にオーバーレイを付与するためにフック
        const _origRender = renderNotebook;
        function renderNotebookWithOverlay() {
            // 再描画前に各ページの手書き内容を保存
            const savedDrawings = [];
            document.querySelectorAll('.a4-paper').forEach((p, i) => {
                const overlay = p.querySelector('.drawing-overlay');
                if (overlay) {
                    // 選択ハイライト以外の要素を保存
                    const els = Array.from(overlay.children).filter(c => !c.classList.contains('sel-highlight'));
                    savedDrawings[i] = els.map(el => el.cloneNode(true));
                }
            });

            clearSelection();
            _origRender();

            // 再描画後にオーバーレイを追加し、保存した手書き内容を復元
            document.querySelectorAll('.a4-paper').forEach((p, i) => {
                if (!p.querySelector('.drawing-overlay')) {
                    addDrawingOverlay(p);
                }
                if (savedDrawings[i] && savedDrawings[i].length > 0) {
                    const overlay = p.querySelector('.drawing-overlay');
                    if (overlay) {
                        savedDrawings[i].forEach(el => overlay.appendChild(el));
                    }
                }
            });
            
            updateCharStatus();
            updateCursorHighlight();
        }

        // ===== 補助テキスト/カーソル関連ロジック =====
        function getMaxCharsPerLine() {
            const tid = elements.templateSelect.value;
            const tpl = TEMPLATES[tid];
            if (tpl?.isGenko) return 20;
            if (tpl?.isNumberPractice) return 10;
            if (tpl?.isMath17) return 12;
            if (tpl?.isMath22) return 12;
            
            const direction = Array.from(elements.direction).find(radio => radio.checked).value;
            const colsCount = parseInt(elements.cols.value) || 10;
            const rowsCount = parseInt(elements.rows.value) || 7;
            return direction === 'horizontal' ? colsCount : rowsCount;
        }

        function updateCharStatus() {
            const statusEl = document.getElementById('charCountStatus');
            if (!statusEl) return;
            
            const text = elements.input.value;
            const pos = elements.input.selectionStart;
            const textBeforeCursor = text.slice(0, pos);
            const lines = textBeforeCursor.split('\n');
            const currentLineNumber = lines.length;
            const currentLineTextBeforeCursor = lines[lines.length - 1];
            
            const parsed = parseColoredText(currentLineTextBeforeCursor, 0);
            const logicalCharCount = parsed.length;
            const maxChars = getMaxCharsPerLine();
            
            statusEl.innerHTML = `現在: <strong>${currentLineNumber}</strong>行目 / <strong>${logicalCharCount}</strong>文字 (改行まで: 残り<strong>${Math.max(0, maxChars - logicalCharCount)}</strong>文字)`;
        }

        function updateCursorHighlight() {
            document.querySelectorAll('.active-cell-highlight').forEach(el => el.classList.remove('active-cell-highlight'));
            
            const enableHighlightBtn = document.getElementById('enableHighlight');
            if (enableHighlightBtn && !enableHighlightBtn.checked) return;

            let pos = elements.input.selectionStart;
            let target = document.querySelector(`.cell[data-source-index="${pos}"], .np-cell[data-source-index="${pos}"]`);
            if (!target && pos > 0) {
                // Seek backwards for the closest character cell
                for (let i = pos - 1; i >= 0; i--) {
                    target = document.querySelector(`.cell[data-source-index="${i}"], .np-cell[data-source-index="${i}"]`);
                    if (target) break;
                }
            }
            if (target) {
                target.classList.add('active-cell-highlight');
                // Ensure highlight is visible over background but behind content if needed
                // It's handled by css rules.
            }
        }

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === elements.input) {
                updateCharStatus();
                updateCursorHighlight();
            }
        });

        elements.scaleWrapper.addEventListener('pointerup', (e) => {
            if (drawing.active) return;
            
            const cell = e.target.closest('.cell, .np-cell');
            if (cell && cell.dataset.sourceIndex) {
                const index = parseInt(cell.dataset.sourceIndex, 10);
                elements.input.focus();
                elements.input.setSelectionRange(index, index);
                updateCharStatus();
                updateCursorHighlight();
            }
        });

        // ===== イベントリスナー =====
        if (document.getElementById('enableHighlight')) {
            document.getElementById('enableHighlight').addEventListener('change', () => {
                saveState();
                updateCursorHighlight();
            });
        }
        elements.input.addEventListener('input', renderNotebookWithOverlay);
        elements.showHeader.addEventListener('change', renderNotebookWithOverlay);
        elements.cols.addEventListener('input', () => { elements.templateSelect.value = 'custom'; renderNotebookWithOverlay(); });
        elements.rows.addEventListener('input', () => { elements.templateSelect.value = 'custom'; renderNotebookWithOverlay(); });
        elements.style.addEventListener('change', () => { elements.templateSelect.value = 'custom'; renderNotebookWithOverlay(); });
        let currentDirection = Array.from(elements.direction).find(r => r.checked).value;
        elements.direction.forEach(radio => radio.addEventListener('change', (e) => {
            if (e.target.checked && e.target.value !== currentDirection) {
                elements.templateSelect.value = 'custom';
                const temp = elements.cols.value;
                elements.cols.value = elements.rows.value;
                elements.rows.value = temp;
                currentDirection = e.target.value;
            }
            renderNotebookWithOverlay();
        }));

        elements.templateSelect.addEventListener('change', (e) => {
            const templateId = e.target.value;
            const isSpecial = isSpecialTemplate(templateId);
            elements.cols.disabled = !!isSpecial;
            elements.rows.disabled = !!isSpecial;
            elements.style.disabled = !!isSpecial;
            elements.showHeader.disabled = !!isSpecial;
            elements.direction.forEach(r => r.disabled = !!isSpecial);

            if (templateId !== 'custom' && TEMPLATES[templateId]) {
                const tpl = TEMPLATES[templateId];
                if (!isSpecial) {
                    elements.cols.value = tpl.cols;
                    elements.rows.value = tpl.rows;
                    elements.style.value = tpl.style;
                    elements.direction.forEach(radio => {
                        radio.checked = (radio.value === tpl.dir);
                    });
                    currentDirection = tpl.dir;
                }
            }
            renderNotebookWithOverlay();
        });

        elements.fontSizeRatio.addEventListener('input', (e) => {
            elements.fontSizeDisplay.textContent = e.target.value;
            renderNotebookWithOverlay();
        });

        window.addEventListener('resize', () => {
            adjustScale();
            // リサイズ時はオーバーレイを再アタッチ（サイズ追従のため）
            document.querySelectorAll('.a4-paper').forEach(p => {
                if (!p.querySelector('.drawing-overlay')) addDrawingOverlay(p);
            });
        });

        adjustScale();
        renderNotebookWithOverlay();
    </script>
</body>
</html>
